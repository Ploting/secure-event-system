services:
  mysql:
    image: mysql:8.0
    container_name: secure-event-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: secure-event-db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: secure-event-backend
    restart: unless-stopped

    environment:
      PORT: 5000
      NODE_ENV: production

      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: secure-event-db

      JWT_SECRET: local_docker_jwt_secret_change_me
      JWT_EXPIRES_IN: 1d

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000

    container_name: secure-event-frontend
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  mysql_data: